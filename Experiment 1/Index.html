<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Practical 1</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 80px;
        }

        .container{
            width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        button{
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }
    </style>

    <!-- Internal JavaScript -->
    <script>
        function showWelcome() {
            document.getElementById("message").innerHTML =
                "Welcome to JavaScript Practical!";
        }
    </script>

</head>
<body>

<div class="container">

    <h1>JavaScript Practical 1</h1>

    <p id="message">Click the button below.</p>

    <!-- Inline JavaScript -->
    <button onclick="showWelcome()">
        Show Welcome Message
    </button>

    <!-- Inline JavaScript -->
    <button onclick="displayInfo()">
        Show Environment Info
    </button>

</div>

<!-- External JavaScript -->
<script src="script.js"></script>

</body>
</html>
